# ============================================================
# 遗忘者归乡论坛 - Docker Compose 一键启动
# ============================================================
# 用法：
#   docker compose up -d         启动
#   docker compose logs -f        查看日志
#   docker compose down           停止
#   docker compose restart forum  重启
# ============================================================

services:
  forum:
    build:
      context: .
      dockerfile: Dockerfile
    image: yiwanzhe-forum:latest
    container_name: yiwanzhe-forum
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/forum.db
    volumes:
      # SQLite 数据库持久化
      - forum-data:/app/data
      # 上传文件持久化
      - forum-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  forum-data:
    name: yiwanzhe-forum-data
  forum-uploads:
    name: yiwanzhe-forum-uploads

# ---------- 反向代理示例（可选，取消注释可启用） ----------
# 如果想用 nginx/traefik 转发，把上面 ports 改成：
#   expose:
#     - "3000"
# 然后加 nginx service 并 depends_on forum
